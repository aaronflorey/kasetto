site_name: Kasetto
docs_dir: .
site_dir: ../site
site_url: https://docs.kasetto.dev
site_description: A declarative AI agent environment manager, written in Rust.
repo_url: https://github.com/pivoshenko/kasetto
repo_name: pivoshenko/kasetto
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: .overrides
  logo: assets/logo.svg
  favicon: assets/icon.svg
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: kasetto-light
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: kasetto-dark
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.sections
    - navigation.indexes
    - navigation.tracking
    - navigation.footer
    - navigation.top
    - content.code.copy
    - content.tabs.link
    - content.code.annotate
    - toc.follow
    - search.suggest
    - search.highlight

extra_css:
  - stylesheets/extra.css

extra:
  homepage: https://www.kasetto.dev/
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/pivoshenko/kasetto

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - tables
  - toc:
      anchorlink: true
      anchorlink_class: "toclink"
  - pymdownx.details
  - pymdownx.snippets
  - pymdownx.magiclink
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.keys
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji ""
      emoji_generator:

        !!python/name:material.extensions.emoji.to_svg ""
plugins:
  - search

nav:
  - Getting Started:
      - Quick Start: index.md
      - Installation: installation.md
  - Reference:
      - Configuration: configuration.md
      - Commands: commands.md
      - How Sync Works: how-sync-works.md
      - Writing Skills: writing-skills.md
      - Authentication: authentication.md
      - Supported Agents: agents.md
  - Guides:
      - CI & automation: ci.md
      - Cookbook: cookbook.md
      - Security model: security.md
  - FAQ: faq.md
  - Roadmap: roadmap.md
